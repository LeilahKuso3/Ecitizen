name: AL CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download AL Language extension
        shell: pwsh
        run: |
          $vsixUrl = 'https://marketplace.visualstudio.com/_apis/public/gallery/publishers/ms-dynamics-smb/extensions/al/latest/assetbyname/Microsoft.VisualStudio.Services.VSIXPackage'
          $vsixPath = Join-Path $env:TEMP 'al-language.vsix'
          Write-Host "Downloading AL extension from $vsixUrl"
          Invoke-WebRequest -Uri $vsixUrl -OutFile $vsixPath -UseBasicParsing
          $extPath = Join-Path $env:TEMP 'al-language-ext'
          Remove-Item -Recurse -Force $extPath -ErrorAction SilentlyContinue
          Expand-Archive -Path $vsixPath -DestinationPath $extPath -Force
          Write-Host "AL extension extracted to $extPath"
          Add-Content -Path $env:GITHUB_ENV -Value "AL_EXTENSION_PATH=$extPath"

      - name: Build AL app with direct compiler
        shell: pwsh
        run: |
          $script = Join-Path $env:GITHUB_WORKSPACE ".github/scripts/build-app.ps1"
          & $script -ProjectPath (Join-Path $env:GITHUB_WORKSPACE "eCitizen") -OutputFolder (Join-Path $env:GITHUB_WORKSPACE "eCitizen\out") -AlExtensionPath $env:AL_EXTENSION_PATH

      - name: Upload compiled app artifact
        uses: actions/upload-artifact@v4
        with:
          name: eCitizen-app
          path: eCitizen/out/**/*.app
