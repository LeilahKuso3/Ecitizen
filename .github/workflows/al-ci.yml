name: AL CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install BCContainerHelper
        shell: pwsh
        run: |
          Install-Module -Name BcContainerHelper -Scope CurrentUser -Force -AllowClobber
          Import-Module BcContainerHelper

      - name: Build AL app in BC container
        shell: pwsh
        run: |
          $script = Join-Path $env:GITHUB_WORKSPACE ".github\scripts\build-app.ps1"
          & $script

      - name: Upload compiled app artifact
        uses: actions/upload-artifact@v4
        with:
          name: eCitizen-app
          path: out/**/*.app
