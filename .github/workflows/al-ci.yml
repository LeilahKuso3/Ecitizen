name: AL CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download AL Language extension
        shell: pwsh
        run: |
          $queryUrl = 'https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery?api-version=3.0-preview.1'
          $body = @{
            filters = @(
              @{
                criteria = @(
                  @{ filterType = 7; value = 'ms-dynamics-smb.al' }
                )
                pageSize = 1
                pageNumber = 1
                sortBy = 0
                sortOrder = 0
              }
            )
            flags = 103
          }
          $json = $body | ConvertTo-Json -Depth 10
          $response = Invoke-RestMethod -Uri $queryUrl -Method Post -ContentType 'application/json' -Body $json -Headers @{ 'User-Agent' = 'Mozilla/5.0' }
          $asset = $response.results |
            ForEach-Object { $_.extensions } |
            ForEach-Object { $_.versions } |
            ForEach-Object {
              $files = @()
              if ($_.PSObject.Properties.Match('files')) { $files += $_.files }
              if ($_.PSObject.Properties.Match('assets')) { $files += $_.assets }
              $files
            } |
            Where-Object { $_.assetTypeId -eq 'Microsoft.VisualStudio.Services.VSIXPackage' -or $_.assetType -eq 'Microsoft.VisualStudio.Services.VSIXPackage' } |
            Select-Object -First 1
          if (-not $asset) {
            throw 'AL VSIX asset not found from Marketplace query.'
          }
          $vsixUrl = $asset.source
          $vsixPath = Join-Path $env:TEMP 'al-language.vsix'
          Write-Host "Downloading AL extension VSIX from $vsixUrl"
          Invoke-WebRequest -Uri $vsixUrl -OutFile $vsixPath -UseBasicParsing -Headers @{ 'User-Agent' = 'Mozilla/5.0' }
          $extPath = Join-Path $env:TEMP 'al-language-ext'
          Remove-Item -Recurse -Force $extPath -ErrorAction SilentlyContinue
          Expand-Archive -Path $vsixPath -DestinationPath $extPath -Force
          Write-Host "AL extension extracted to $extPath"
          Add-Content -Path $env:GITHUB_ENV -Value "AL_EXTENSION_PATH=$extPath"

      - name: Build AL app with direct compiler
        shell: pwsh
        run: |
          $script = Join-Path $env:GITHUB_WORKSPACE ".github/scripts/build-app.ps1"
          & $script -ProjectPath (Join-Path $env:GITHUB_WORKSPACE "eCitizen") -OutputFolder (Join-Path $env:GITHUB_WORKSPACE "eCitizen\out") -AlExtensionPath $env:AL_EXTENSION_PATH

      - name: Upload compiled app artifact
        uses: actions/upload-artifact@v4
        with:
          name: eCitizen-app
          path: eCitizen/out/**/*.app
